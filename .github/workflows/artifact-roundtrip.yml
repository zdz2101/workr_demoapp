name: artifact-roundtrip

# Demonstrates workr 1.1.0's built-in "github_artifact" load/save providers:
# one job computes results and saves a bundle, a second job restores that
# bundle from the uploaded artifact and continues — no recomputation.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  produce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install workr
        shell: Rscript {0}
        run: |
          install.packages("pak")
          pak::pak("Gilead-BioStats/workr")

      - name: Run pipeline and write the github_artifact bundle
        shell: Rscript {0}
        env:
          WORKR_ARTIFACT_DIR: artifact-out
        run: source("scripts/ci_produce.R")

      - name: Upload the workflow-data artifact
        uses: actions/upload-artifact@v4
        with:
          name: workr-demo-data
          path: artifact-out/workr-demo-data
          retention-days: 7

  consume:
    needs: produce
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install workr
        shell: Rscript {0}
        run: |
          install.packages("pak")
          pak::pak("Gilead-BioStats/workr")

      - name: Download the workflow-data artifact
        uses: actions/download-artifact@v4
        with:
          name: workr-demo-data
          path: artifact-in/workr-demo-data

      - name: Restore the bundle and continue
        shell: Rscript {0}
        env:
          WORKR_INCOMING_DIR: artifact-in
        run: source("scripts/ci_consume.R")
